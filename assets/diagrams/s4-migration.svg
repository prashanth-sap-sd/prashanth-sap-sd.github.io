<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#8a5bff"/>
    </linearGradient>
    <style>
      .bg{fill:#0b1220}
      .card{fill:#121c33;stroke:rgba(255,255,255,.14);stroke-width:1.2}
      .t{fill:#eaf0ff;font-family:Inter,Arial;font-size:20px;font-weight:800}
      .s{fill:rgba(234,240,255,.7);font-family:Inter,Arial;font-size:14px;font-weight:650}
      .arrow{stroke:rgba(234,240,255,.55);stroke-width:2.2;marker-end:url(#m)}
      .dot{fill:url(#g)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(234,240,255,.65)"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" rx="26"/>
  <rect x="40" y="36" width="1120" height="348" rx="22" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.08)"/>

  <text class="t" x="70" y="82">S/4HANA Migration – SD Workstream</text>
  <text class="s" x="70" y="108">Readiness → Build → Test → Cutover → Hypercare Stabilization</text>

  <g transform="translate(70,150)">
    <rect class="card" x="0" y="0" width="220" height="95" rx="16"/>
    <circle cx="26" cy="30" r="8" class="dot"/>
    <text class="t" x="44" y="40">Readiness</text>
    <text class="s" x="18" y="68">Fit/Gap • scope • deps</text>

    <line class="arrow" x1="235" y1="48" x2="345" y2="48"/>

    <rect class="card" x="360" y="0" width="220" height="95" rx="16"/>
    <circle cx="386" cy="30" r="8" class="dot"/>
    <text class="t" x="404" y="40">Build</text>
    <text class="s" x="378" y="68">Config • integrations</text>

    <line class="arrow" x1="595" y1="48" x2="705" y2="48"/>

    <rect class="card" x="720" y="0" width="220" height="95" rx="16"/>
    <circle cx="746" cy="30" r="8" class="dot"/>
    <text class="t" x="764" y="40">Testing</text>
    <text class="s" x="738" y="68">SIT • reg • UAT</text>

    <line class="arrow" x1="955" y1="48" x2="1065" y2="48"/>

    <rect class="card" x="1080" y="0" width="220" height="95" rx="16"/>
    <circle cx="1106" cy="30" r="8" class="dot"/>
    <text class="t" x="1124" y="40">Cutover</text>
    <text class="s" x="1098" y="68">Checklist • transports</text>
  </g>

  <g transform="translate(70,270)">
    <rect class="card" x="0" y="0" width="1120" height="95" rx="18"/>
    <circle cx="30" cy="48" r="10" class="dot"/>
    <text class="t" x="54" y="44">Hypercare & Stabilization</text>
    <text class="s" x="54" y="70">Triage → Fix → Validate → Prevent recurrence • Documentation handoff to support</text>
  </g>
</svg>
